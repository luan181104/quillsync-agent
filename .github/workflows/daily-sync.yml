name: Daily OptiSigns Sync

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC every day
  workflow_dispatch: {}    # allows manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily sync job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_FILE_SEARCH_STORE_NAME: ${{ secrets.GEMINI_FILE_SEARCH_STORE_NAME }}
        run: python main.py

      - name: Commit updated state.json + articles/
        run: |
          git config user.name "quillsync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f state.json articles/
          git diff --cached --quiet || git commit -m "chore: daily sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push